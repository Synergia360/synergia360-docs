<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergia360 — Set Up Company</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F9FC;--surface:#FFFFFF;--surface-2:#F8FAFF;--border:#E2E8F0;
  --accent:#4F46E5;--accent-dim:rgba(79,70,229,.08);--accent-light:#EEF2FF;
  --text:#0F172A;--text-2:#475569;--text-3:#94A3B8;
  --green:#10B981;--green-dim:rgba(16,185,129,.08);--green-light:#ECFDF5;
  --red:#EF4444;--red-dim:rgba(239,68,68,.08);--red-light:#FEF2F2;
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,.08);--amber-light:#FFFBEB;
  --blue:#3B82F6;--font:'Inter',sans-serif;--mono:'Geist Mono',monospace;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;padding-bottom:60px}

.progress-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10
}
.logo{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:-0.3px}
.logo span{color:var(--text-3);font-weight:400}
.step-center{display:flex;flex-direction:column;align-items:center;gap:7px}
.step-dots{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .2s}
.dot.done{background:var(--green)}
.dot.active{background:var(--accent);width:28px;border-radius:5px}
.step-labels{font-size:12px;color:var(--text-3);display:flex;gap:4px;align-items:center}
.step-labels .done-l{color:var(--green);font-weight:500}
.step-labels .active-l{color:var(--accent);font-weight:600}
.step-count{font-size:13px;color:var(--text-3)}

.page-body{max-width:520px;margin:0 auto;padding:40px 20px}
.card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:40px;box-shadow:var(--shadow)}

.card-icon{
  width:56px;height:56px;border-radius:14px;background:var(--accent-light);
  display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:20px
}
.card-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-0.4px}
.card-subtitle{color:var(--text-2);font-size:14px;margin-bottom:32px;line-height:1.6}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.optional{font-weight:400;color:var(--text-3);margin-left:4px}
.form-input,.form-select{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;
  font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface);
  outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none
}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.select-wrap{position:relative}
.select-wrap::after{
  content:'';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  border-left:5px solid transparent;border-right:5px solid transparent;
  border-top:5px solid var(--text-3);pointer-events:none
}

.radio-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.radio-card{
  border:2px solid var(--border);border-radius:10px;padding:12px 16px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px
}
.radio-card:hover{border-color:#C7D2FE}
.radio-card.selected{border-color:var(--accent);background:var(--accent-light)}
.radio-dot{
  width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s
}
.radio-card.selected .radio-dot{border-color:var(--accent);background:var(--accent)}
.radio-dot-inner{width:6px;height:6px;border-radius:50%;background:white}
.radio-label{font-size:13px;font-weight:500;color:var(--text-2)}
.radio-card.selected .radio-label{color:var(--accent);font-weight:600}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:32px;padding-top:24px;border-top:1px solid var(--border)
}
.btn-back{
  padding:11px 20px;border:1px solid var(--border);border-radius:10px;
  background:transparent;font-family:var(--font);font-size:14px;font-weight:500;
  color:var(--text-2);cursor:pointer;transition:all .15s
}
.btn-back:hover{border-color:var(--text-3);color:var(--text)}
.btn-continue{
  padding:12px 24px;background:var(--accent);color:white;border:none;border-radius:10px;
  font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;
  transition:background .15s;display:flex;align-items:center;gap:8px
}
.btn-continue:hover{background:#4338CA}
</style>
</head>
<body>

<header class="progress-header">
  <div class="logo">Synergia<span>360</span></div>
  <div class="step-center">
    <div class="step-dots">
      <div class="dot done"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
    <div class="step-labels">
      <span class="done-l">1. Account ✓</span>
      <span>·</span>
      <span class="active-l">2. Company</span>
      <span>·</span>
      <span>3. Channels</span>
    </div>
  </div>
  <div class="step-count">Step 2 of 3</div>
</header>

<div class="page-body">
  <div class="card">
    <div class="card-icon">🏢</div>
    <h1 class="card-title">Set up your company</h1>
    <p class="card-subtitle">Tell us about your business so we can personalise your experience</p>

    <div class="form-group">
      <label class="form-label">Company Name</label>
      <input class="form-input" type="text" placeholder="e.g. Acme Ltd">
    </div>

    <div class="form-group">
      <label class="form-label">Industry</label>
      <div class="select-wrap">
        <select class="form-select">
          <option>E-commerce</option>
          <option>Retail</option>
          <option>Wholesale</option>
          <option>Manufacturing</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Company Size</label>
      <div class="radio-grid">
        <div class="radio-card">
          <div class="radio-dot"></div>
          <span class="radio-label">1–10 employees</span>
        </div>
        <div class="radio-card selected">
          <div class="radio-dot"><div class="radio-dot-inner"></div></div>
          <span class="radio-label">11–50 employees</span>
        </div>
        <div class="radio-card">
          <div class="radio-dot"></div>
          <span class="radio-label">51–200 employees</span>
        </div>
        <div class="radio-card">
          <div class="radio-dot"></div>
          <span class="radio-label">200+ employees</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Annual GMV</label>
      <div class="select-wrap">
        <select class="form-select">
          <option>Under £100k</option>
          <option selected>£100k–£500k</option>
          <option>£500k–£2M</option>
          <option>£2M–£10M</option>
          <option>£10M+</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Registered Country</label>
      <div class="select-wrap">
        <select class="form-select">
          <option selected>United Kingdom</option>
          <option>United States</option>
          <option>Germany</option>
          <option>France</option>
          <option>Australia</option>
          <option>Canada</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">VAT Number <span class="optional">Optional</span></label>
      <input class="form-input" type="text" placeholder="GB123456789">
    </div>

    <div class="card-footer">
      <button class="btn-back">← Back</button>
      <button class="btn-continue">
        Continue
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

</body>
</html>
