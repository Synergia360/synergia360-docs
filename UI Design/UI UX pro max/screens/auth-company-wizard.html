<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synergia — Company Setup</title>
  <link rel="stylesheet" href="../shared.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-bg: #141414;
      --color-surface: #1E1E1E;
      --color-surface-raised: #252525;
      --color-border: #383838;
      --color-border-active: #5A5A5A;
      --color-text: #F2F2F2;
      --color-text-muted: #999999;
      --color-text-subtle: #666666;
      --color-accent: #C4972A;
      --color-accent-dim: #8B6914;
      --color-accent-glow: rgba(196,151,42,0.15);
      --color-success: #4A9E6E;
    }

    body {
      min-height: 100vh;
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative;
      padding: 32px 16px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(196,151,42,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .wizard-card {
      width: 100%;
      max-width: 540px;
      background: var(--color-surface);
      border: 1px solid rgba(196,151,42,0.2);
      border-radius: 18px;
      padding: 44px 48px;
      position: relative;
      z-index: 10;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(196,151,42,0.06);
    }

    .card-corner { position: absolute; width: 24px; height: 24px; }
    .card-corner.tl { top: -1px; left: -1px; border-top: 2px solid var(--color-accent); border-left: 2px solid var(--color-accent); border-radius: 18px 0 0 0; }
    .card-corner.tr { top: -1px; right: -1px; border-top: 2px solid var(--color-accent); border-right: 2px solid var(--color-accent); border-radius: 0 18px 0 0; }
    .card-corner.bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--color-accent); border-left: 2px solid var(--color-accent); border-radius: 0 0 0 18px; }
    .card-corner.br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--color-accent); border-right: 2px solid var(--color-accent); border-radius: 0 0 18px 0; }

    /* Logo bar */
    .wizard-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-s {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #C4972A 0%, #8B6914 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 800;
      color: #141414;
      box-shadow: 0 0 16px rgba(196,151,42,0.3);
    }

    .logo-name { font-size: 16px; font-weight: 700; color: var(--color-text); letter-spacing: -0.01em; }

    /* Step indicators */
    .step-indicators {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 36px;
    }

    .step-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      position: relative;
    }

    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      background: var(--color-surface-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--color-text-subtle);
      position: relative;
      z-index: 2;
      transition: all 0.2s;
    }

    .step-dot.active {
      border-color: var(--color-accent);
      background: var(--color-accent-glow);
      color: var(--color-accent);
      box-shadow: 0 0 12px rgba(196,151,42,0.3);
    }

    .step-dot.done {
      border-color: var(--color-success);
      background: rgba(74,158,110,0.15);
      color: var(--color-success);
    }

    .step-label {
      font-size: 10px;
      color: var(--color-text-subtle);
      text-align: center;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    .step-node.active .step-label { color: var(--color-accent); font-weight: 600; }
    .step-node.done .step-label { color: var(--color-success); }

    .step-connector {
      flex: 1;
      height: 1px;
      background: var(--color-border);
      margin-top: -22px;
      position: relative;
      z-index: 1;
    }

    .step-connector.done { background: var(--color-success); opacity: 0.5; }
    .step-connector.active { background: linear-gradient(90deg, rgba(74,158,110,0.5), rgba(196,151,42,0.4)); }

    /* Wizard content */
    .wizard-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .wizard-subheading {
      font-size: 13.5px;
      color: var(--color-text-muted);
      margin-bottom: 28px;
    }

    .input-group { margin-bottom: 16px; }

    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-field {
      width: 100%;
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--color-text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-field:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(196,151,42,0.12);
    }

    .input-field::placeholder { color: var(--color-text-subtle); }

    select.input-field { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23666' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .optional-tag {
      font-size: 10px;
      color: var(--color-text-subtle);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 6px;
    }

    /* Tip box */
    .tip-box {
      background: var(--color-accent-glow);
      border: 1px solid rgba(196,151,42,0.2);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .tip-icon { color: var(--color-accent); flex-shrink: 0; margin-top: 1px; }
    .tip-text { font-size: 12.5px; color: var(--color-text-muted); line-height: 1.5; }

    /* Action bar */
    .wizard-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--color-border);
    }

    .skip-link {
      font-size: 12px;
      color: var(--color-text-subtle);
      text-decoration: none;
      transition: color 0.15s;
    }

    .skip-link:hover { color: var(--color-text-muted); }

    .action-btns { display: flex; gap: 10px; }

    .btn-back {
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 10px 20px;
      color: var(--color-text-muted);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-back:hover { border-color: var(--color-border-active); color: var(--color-text); }

    .btn-next {
      background: linear-gradient(135deg, var(--color-accent) 0%, #D4A830 100%);
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      color: #141414;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 12px rgba(196,151,42,0.2);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-next:hover { box-shadow: 0 4px 20px rgba(196,151,42,0.35); transform: translateY(-1px); }

    /* Progress bar */
    .progress-bar-outer {
      height: 3px;
      background: var(--color-border);
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      width: 33%;
      background: linear-gradient(90deg, var(--color-accent), #D4A830);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>

  <div class="wizard-card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <div class="wizard-logo">
      <div class="logo-s">S</div>
      <span class="logo-name">Synergia</span>
    </div>

    <!-- Progress -->
    <div class="progress-bar-outer">
      <div class="progress-bar-inner"></div>
    </div>

    <!-- Step indicators -->
    <div class="step-indicators">
      <div class="step-node active">
        <div class="step-dot active">1</div>
        <div class="step-label">Company</div>
      </div>
      <div class="step-connector"></div>
      <div class="step-node">
        <div class="step-dot">2</div>
        <div class="step-label">Channels</div>
      </div>
      <div class="step-connector"></div>
      <div class="step-node">
        <div class="step-dot">3</div>
        <div class="step-label">Preferences</div>
      </div>
    </div>

    <div class="wizard-heading">Set up your company</div>
    <div class="wizard-subheading">This helps us tailor Synergia to your business. You can update these later.</div>

    <!-- Tip -->
    <div class="tip-box">
      <div class="tip-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      </div>
      <div class="tip-text">Your VAT number is used to auto-populate compliance settings for UK marketplaces like eBay and Amazon.</div>
    </div>

    <!-- Company Name -->
    <div class="input-group">
      <label class="input-label">Company / Trading Name</label>
      <input type="text" class="input-field" placeholder="e.g. Meridian Trading Ltd" value="Meridian Trading Ltd">
    </div>

    <!-- Country + VAT row -->
    <div class="two-col">
      <div class="input-group">
        <label class="input-label">Country</label>
        <select class="input-field">
          <option value="GB" selected>🇬🇧 United Kingdom</option>
          <option value="US">🇺🇸 United States</option>
          <option value="DE">🇩🇪 Germany</option>
          <option value="FR">🇫🇷 France</option>
          <option value="AU">🇦🇺 Australia</option>
        </select>
      </div>
      <div class="input-group">
        <label class="input-label">VAT Number <span class="optional-tag">(optional)</span></label>
        <input type="text" class="input-field" placeholder="GB 123 456 789" value="GB 312 847 291">
      </div>
    </div>

    <!-- Base Currency + Company Size -->
    <div class="two-col">
      <div class="input-group">
        <label class="input-label">Base Currency</label>
        <select class="input-field">
          <option value="GBP" selected>£ GBP — British Pound</option>
          <option value="USD">$ USD — US Dollar</option>
          <option value="EUR">€ EUR — Euro</option>
        </select>
      </div>
      <div class="input-group">
        <label class="input-label">Company Size</label>
        <select class="input-field">
          <option>Solo / 1 person</option>
          <option selected>2–10 employees</option>
          <option>11–50 employees</option>
          <option>50+ employees</option>
        </select>
      </div>
    </div>

    <!-- Phone -->
    <div class="input-group">
      <label class="input-label">Contact Phone <span class="optional-tag">(optional)</span></label>
      <input type="tel" class="input-field" placeholder="+44 7700 900 000">
    </div>

    <!-- Actions -->
    <div class="wizard-actions">
      <a href="auth-signup.html" class="skip-link">← Back to sign up</a>
      <div class="action-btns">
        <button class="btn-back">Back</button>
        <button class="btn-next">
          Continue
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

</body>
</html>
