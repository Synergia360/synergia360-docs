<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synergia — Sign In</title>
  <link rel="stylesheet" href="../shared.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-bg: #141414;
      --color-surface: #1E1E1E;
      --color-surface-raised: #252525;
      --color-border: #383838;
      --color-border-active: #5A5A5A;
      --color-text: #F2F2F2;
      --color-text-muted: #999999;
      --color-text-subtle: #666666;
      --color-accent: #C4972A;
      --color-accent-dim: #8B6914;
      --color-accent-glow: rgba(196,151,42,0.15);
    }

    body {
      min-height: 100vh;
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Subtle radial glow behind card */
    body::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(196,151,42,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Grid texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--color-surface);
      border: 1px solid rgba(196,151,42,0.25);
      border-radius: 16px;
      padding: 40px;
      position: relative;
      z-index: 10;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(196,151,42,0.08);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-mark-large {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #C4972A 0%, #8B6914 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #141414;
      margin: 0 auto 16px;
      box-shadow: 0 0 32px rgba(196,151,42,0.3), 0 4px 16px rgba(0,0,0,0.4);
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.02em;
    }

    .logo-wordmark {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .logo-tagline {
      font-size: 12px;
      color: var(--color-text-subtle);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .auth-heading {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .auth-subheading {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 28px;
    }

    .input-group { margin-bottom: 16px; }

    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-subtle);
      pointer-events: none;
    }

    .input-field {
      width: 100%;
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 10px 14px 10px 38px;
      color: var(--color-text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-field:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(196,151,42,0.12);
    }

    .input-field::placeholder { color: var(--color-text-subtle); }

    .forgot-link {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .forgot-link a {
      font-size: 12px;
      color: var(--color-text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .forgot-link a:hover { color: var(--color-accent); }

    .btn-primary-full {
      width: 100%;
      background: linear-gradient(135deg, var(--color-accent) 0%, #D4A830 100%);
      color: #141414;
      font-weight: 700;
      font-size: 14px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.01em;
      transition: all 0.15s;
      box-shadow: 0 2px 12px rgba(196,151,42,0.25);
      margin-top: 8px;
      margin-bottom: 16px;
    }

    .btn-primary-full:hover {
      box-shadow: 0 4px 24px rgba(196,151,42,0.4);
      transform: translateY(-1px);
    }

    .divider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .divider-text {
      font-size: 11px;
      color: var(--color-text-subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .magic-link-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--color-text-muted);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .magic-link-btn:hover {
      border-color: var(--color-border-active);
      color: var(--color-text);
      background: rgba(255,255,255,0.03);
    }

    .auth-footer {
      text-align: center;
      font-size: 12.5px;
      color: var(--color-text-muted);
    }

    .auth-footer a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { text-decoration: underline; }

    /* corner accent lines */
    .card-corner {
      position: absolute;
      width: 20px;
      height: 20px;
    }

    .card-corner.tl { top: -1px; left: -1px; border-top: 2px solid var(--color-accent); border-left: 2px solid var(--color-accent); border-radius: 16px 0 0 0; }
    .card-corner.tr { top: -1px; right: -1px; border-top: 2px solid var(--color-accent); border-right: 2px solid var(--color-accent); border-radius: 0 16px 0 0; }
    .card-corner.bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--color-accent); border-left: 2px solid var(--color-accent); border-radius: 0 0 0 16px; }
    .card-corner.br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--color-accent); border-right: 2px solid var(--color-accent); border-radius: 0 0 16px 0; }
  </style>
</head>
<body>

  <div class="auth-card">
    <!-- Corner accents -->
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-mark-large">S</div>
      <div class="logo-wordmark">Synergia</div>
      <div class="logo-tagline">Multichannel Commerce OS</div>
    </div>

    <div class="auth-heading">Welcome back</div>
    <div class="auth-subheading">Sign in to your workspace</div>

    <!-- Email -->
    <div class="input-group">
      <label class="input-label">Email Address</label>
      <div class="input-wrapper">
        <span class="input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <input type="email" class="input-field" placeholder="you@company.co.uk" value="admin@meridiantrading.co.uk">
      </div>
    </div>

    <!-- Password -->
    <div class="input-group">
      <label class="input-label">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" class="input-field" placeholder="••••••••••••" value="hunter2">
      </div>
      <div class="forgot-link">
        <a href="#">Forgot password?</a>
      </div>
    </div>

    <button class="btn-primary-full">
      Sign in
    </button>

    <div class="divider-row">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <button class="magic-link-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
      Send magic link instead
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="auth-signup.html">Sign up free</a>
    </div>
  </div>

</body>
</html>
