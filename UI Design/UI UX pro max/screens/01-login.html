<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synergia — Sign In</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      background-image:
        radial-gradient(ellipse 600px 400px at 50% 0%, rgba(196,151,42,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 80% 80%, rgba(58,107,139,0.05) 0%, transparent 70%);
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
    }

    .auth-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
    }

    .auth-wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .wordmark-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-dim) 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #141414;
      box-shadow: 0 0 20px rgba(196,151,42,0.25);
    }

    .wordmark-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-accent);
      letter-spacing: -0.02em;
    }

    .auth-heading {
      font-size: 26px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .auth-subheading {
      font-size: 14px;
      color: var(--color-text-muted);
      margin-bottom: 28px;
    }

    .warning-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(212,135,44,0.1);
      border: 1px solid rgba(212,135,44,0.3);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      margin-bottom: 20px;
    }

    .warning-banner svg { flex-shrink: 0; margin-top: 1px; }

    .warning-banner-text {
      font-size: 12.5px;
      color: var(--color-warning);
      line-height: 1.5;
    }

    .warning-banner-text strong { font-weight: 600; display: block; }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-subtle);
      pointer-events: none;
    }

    .input-icon-wrap .input-field {
      padding-left: 38px;
    }

    .input-icon-wrap .input-field:focus + svg,
    .input-icon-wrap .input-field:focus ~ svg {
      color: var(--color-accent);
    }

    .input-addon-right {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-subtle);
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px;
      display: flex;
      align-items: center;
    }

    .input-addon-right:hover { color: var(--color-text-muted); }

    .form-row-spaced {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--color-text-muted);
      cursor: pointer;
    }

    .checkbox-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--color-accent);
      cursor: pointer;
    }

    .link-muted {
      font-size: 13px;
      color: var(--color-accent-dim);
      text-decoration: none;
      transition: color 0.15s;
    }

    .link-muted:hover { color: var(--color-accent); }

    .btn-full { width: 100%; justify-content: center; padding: 11px 16px; font-size: 14px; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--color-text-subtle);
      font-size: 12px;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .btn-ghost-full {
      width: 100%;
      justify-content: center;
      padding: 10px 16px;
      font-size: 13.5px;
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
      font-family: var(--font-body);
    }

    .btn-ghost-full:hover {
      border-color: var(--color-border-active);
      color: var(--color-text);
      background: rgba(255,255,255,0.03);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--color-text-muted);
    }

    .auth-footer a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Wordmark -->
      <div class="auth-wordmark">
        <div class="wordmark-icon">S</div>
        <span class="wordmark-text">Synergia</span>
      </div>

      <!-- Heading -->
      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-subheading">Sign in to your multichannel dashboard</p>

      <!-- New device warning -->
      <div class="warning-banner">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#D4872C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <div class="warning-banner-text">
          <strong>New device detected</strong>
          First sign-in from Manchester, UK · Chrome on Windows. If this wasn't you, secure your account.
        </div>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label class="input-label">Email address</label>
        <div class="input-icon-wrap">
          <input type="email" class="input-field" placeholder="you@yourcompany.co.uk" value="james@digitalperception.co.uk">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-icon-wrap">
          <input type="password" class="input-field" placeholder="Enter your password" value="••••••••••••">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button class="input-addon-right">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- Remember + Forgot -->
      <div class="form-row-spaced">
        <label class="checkbox-row">
          <input type="checkbox" checked>
          Remember me for 30 days
        </label>
        <a href="#" class="link-muted">Forgot password?</a>
      </div>

      <!-- Sign In -->
      <button class="btn btn-primary btn-full">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>

      <!-- Or divider -->
      <div class="or-divider">or</div>

      <!-- Magic link -->
      <button class="btn-ghost-full">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Continue with Magic Link
      </button>

    </div>

    <!-- Footer link -->
    <div class="auth-footer">
      Don't have an account? <a href="02-signup.html">Start free →</a>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
