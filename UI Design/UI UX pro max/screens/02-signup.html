<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synergia — Create Account</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      background-image:
        radial-gradient(ellipse 600px 400px at 50% 0%, rgba(196,151,42,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 20% 100%, rgba(74,158,110,0.04) 0%, transparent 70%);
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
    }

    .auth-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
    }

    .auth-wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .wordmark-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-dim) 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #141414;
      box-shadow: 0 0 20px rgba(196,151,42,0.25);
    }

    .wordmark-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-accent);
      letter-spacing: -0.02em;
    }

    .auth-heading {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .auth-subheading {
      font-size: 13.5px;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    /* Plan teaser */
    .plan-teaser {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      align-items: center;
    }

    .plan-teaser-label {
      font-size: 11.5px;
      color: var(--color-text-subtle);
      margin-right: 2px;
      white-space: nowrap;
    }

    .plan-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .plan-pill-free {
      background: var(--color-accent-glow);
      border-color: var(--color-accent-dim);
      color: var(--color-accent);
    }

    .plan-pill-starter {
      background: rgba(255,255,255,0.04);
      border-color: var(--color-border);
      color: var(--color-text-subtle);
    }

    .plan-pill-growth {
      background: rgba(255,255,255,0.04);
      border-color: var(--color-border);
      color: var(--color-text-subtle);
    }

    .plan-pill-active-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-accent);
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-subtle);
      pointer-events: none;
    }

    .input-icon-wrap .input-field {
      padding-left: 38px;
    }

    .password-strength {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .strength-bars {
      display: flex;
      gap: 3px;
    }

    .strength-bar {
      height: 3px;
      width: 32px;
      border-radius: 2px;
      background: var(--color-border);
    }

    .strength-bar.filled { background: var(--color-accent); }
    .strength-bar.filled-good { background: var(--color-success); }
    .strength-bar.filled-weak { background: var(--color-warning); }

    .strength-label {
      font-size: 11px;
      color: var(--color-accent);
    }

    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 12.5px;
      color: var(--color-text-muted);
      line-height: 1.5;
      cursor: pointer;
    }

    .terms-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--color-accent);
      cursor: pointer;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .terms-row a {
      color: var(--color-accent);
      text-decoration: none;
    }

    .terms-row a:hover { text-decoration: underline; }

    .btn-full { width: 100%; justify-content: center; padding: 11px 16px; font-size: 14px; }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--color-text-muted);
    }

    .auth-footer a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .plan-compare {
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .plan-compare-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-subtle);
      margin-bottom: 10px;
    }

    .plan-compare-rows {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .plan-compare-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--color-text-muted);
    }

    .plan-compare-row svg { color: var(--color-success); flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Wordmark -->
      <div class="auth-wordmark">
        <div class="wordmark-icon">S</div>
        <span class="wordmark-text">Synergia</span>
      </div>

      <!-- Heading -->
      <h1 class="auth-heading">Start your free trial</h1>
      <p class="auth-subheading">No credit card required · Cancel anytime</p>

      <!-- Plan teaser pills -->
      <div class="plan-teaser">
        <span class="plan-teaser-label">Plan:</span>
        <span class="plan-pill plan-pill-free">
          <span class="plan-active-dot" style="width:6px;height:6px;border-radius:50%;background:var(--color-accent);display:inline-block;"></span>
          Free
        </span>
        <span class="plan-pill plan-pill-starter">Starter</span>
        <span class="plan-pill plan-pill-growth">Growth</span>
      </div>

      <!-- Free plan included -->
      <div class="plan-compare">
        <div class="plan-compare-title">Free plan includes</div>
        <div class="plan-compare-rows">
          <div class="plan-compare-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Up to 2 sales channels connected
          </div>
          <div class="plan-compare-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            100 orders per month
          </div>
          <div class="plan-compare-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Basic inventory sync
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label class="input-label">Work email</label>
        <div class="input-icon-wrap">
          <input type="email" class="input-field" placeholder="you@yourcompany.co.uk">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label class="input-label">Create password</label>
        <div class="input-icon-wrap">
          <input type="password" class="input-field" placeholder="Minimum 8 characters" value="••••••••••">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="password-strength">
          <div class="strength-bars">
            <div class="strength-bar filled-good"></div>
            <div class="strength-bar filled-good"></div>
            <div class="strength-bar filled-good"></div>
            <div class="strength-bar"></div>
          </div>
          <span class="strength-label" style="color:var(--color-success);">Good</span>
        </div>
      </div>

      <!-- Terms -->
      <label class="terms-row">
        <input type="checkbox" checked>
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I may receive product emails — unsubscribe anytime.
      </label>

      <!-- CTA -->
      <button class="btn btn-primary btn-full">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Create Free Account
      </button>

    </div>

    <div class="auth-footer">
      Already have an account? <a href="01-login.html">Sign in →</a>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
